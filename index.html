
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body{
    margin:0;
    background: linear-gradient(#87CEEB, #dff5ff);
    overflow:hidden;
    font-family: Arial, sans-serif;
}

/* suelo */
.suelo{
    position:absolute;
    bottom:0;
    width:100%;
    height:35%;
    background:#6dbf4b;
}

/* flores */
.flor{
    position:absolute;
    bottom:35%;
    transform-origin: bottom;
    animation: crecer 2s ease-out forwards;
}

/* tallo */
.tallo{
    width:6px;
    height:120px;
    background:#2e7d32;
    margin:auto;
}

/* centro */
.centro{
    width:30px;
    height:30px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-15px;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
}

/* pétalos */
.petalo{
    width:25px;
    height:50px;
    background:yellow;
    border-radius:50%;
    position:absolute;
    top:-30px;
    left:50%;
    transform-origin: bottom center;
}

.petalo:nth-child(1){ transform:translateX(-50%) rotate(0deg); }
.petalo:nth-child(2){ transform:translateX(-50%) rotate(45deg); }
.petalo:nth-child(3){ transform:translateX(-50%) rotate(90deg); }
.petalo:nth-child(4){ transform:translateX(-50%) rotate(135deg); }
.petalo:nth-child(5){ transform:translateX(-50%) rotate(180deg); }
.petalo:nth-child(6){ transform:translateX(-50%) rotate(225deg); }
.petalo:nth-child(7){ transform:translateX(-50%) rotate(270deg); }
.petalo:nth-child(8){ transform:translateX(-50%) rotate(315deg); }

/* animación flores */
@keyframes crecer{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* MENSAJE ROMÁNTICO */
.mensaje{
    position:absolute;
    top:10%;
    width:100%;
    text-align:center;
    font-size:38px;
    font-weight:bold;
    color:#444;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid #444;
    width:0;
    animation: escribir 4s steps(60) forwards, parpadeo 0.7s infinite;
}

/* escritura */
@keyframes escribir{
    from{ width:0 }
    to{ width:100% }
}

/* cursor */
@keyframes parpadeo{
    0%{ border-color:transparent }
    50%{ border-color:#444 }
    100%{ border-color:transparent }
}

/* brillo */
.mensaje span{
    color:#ffb300;
    animation: brillo 2s infinite alternate;
}

@keyframes brillo{
    from{ text-shadow:0 0 5px #ffd54f; }
    to{ text-shadow:0 0 20px #ffea00; }
}
</style>
</head>

<body>

<div class="mensaje">
¿Por qué darte un ramo si tú mereces un <span>campo lleno de flores</span>? 🌼💛
</div>

<div class="suelo"></div>

<script>
for(let i=0;i<25;i++){

    let flor = document.createElement("div");
    flor.className = "flor";

    flor.style.left = Math.random()*100 + "%";
    flor.style.animationDelay = (Math.random()*2) + "s";

    flor.innerHTML = `
        <div class="tallo"></div>
        <div class="centro"></div>
        <div class="petalo"></div>
        <div class="petalo"></div>
        <div class="petalo"></div>
        <div class="petalo"></div>
        <div class="petalo"></div>
        <div class="petalo"></div>
        <div class="petalo"></div>
        <div class="petalo"></div>
    `;

    document.body.appendChild(flor);
}
</script>

</body>
</html>
